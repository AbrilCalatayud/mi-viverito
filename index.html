<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pequeño Viverito</title>
    <link href="CSS/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&display=swap" rel="stylesheet">
    <link href="IMG/icono/planta.png" rel="icon">
</head>
<body>
    <header>
        <div class="contenedor-icono">
            <img src="IMG/icono/planta.png" alt="Logo Planta" height="50px">
            <h1>Mi Pequeño Viverito</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#productos">Productos</a></li>
                <li><a href="#resenias">Reseñas</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="productos">
            <h2>Productos</h2>
            <div  class="contenedor-productos">
                <div class="card-producto">
                    <img class="imagen-producto" src="IMG/productos/Aloe-vera.jpg">
                    <div class="info-producto">
                        <h3>Aloe Vera</h3>
                    </div>
                </div>
                <div class="card-producto">
                    <img class="imagen-producto" src="IMG/productos/Culantrillo.jpg">
                    <div class="info-producto">
                        <h3>Culantrillo</h3>
                    </div>
                </div>
                <div class="card-producto">
                    <img class="imagen-producto" src="IMG/productos/Azalea.jpg">
                    <div class="info-producto">
                        <h3>Azalea</h3>
                    </div>
                </div>
                <div class="card-producto">
                    <img class="imagen-producto" src="IMG/productos/Lavanda.jpg">
                    <div class="info-producto">
                        <h3>Lavanda</h3>
                    </div>
                </div>
                <div class="card-producto">
                    <img class="imagen-producto" src="IMG/productos/Calendula.jpg">
                    <div class="info-producto">
                        <h3>Caléndula</h3>
                    </div>
                </div>
                <div class="card-producto">
                    <img class="imagen-producto" src="IMG/productos/Gardenia.jpg">
                    <div class="info-producto">
                        <h3>Gardenia</h3>
                    </div>
                </div>
            </div>
        </section>

        <section id="resenias">
            <h2>Reseñas</h2>
            <img src="IMG/icono/planta.png" height="500px">
        </section>
    </main>

    <footer>
        <section id="contacto">
            <h2>Contacto</h2>
            <form action="URL_de_destino" method="POST">
                <fieldset>

                    <legend>Información Personal</legend>

                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre">

                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email">
                
                </fieldset>

                <fieldset>

                    <legend>Escriba su consulta</legend>
                    <textarea id="consulta" name="consulta" rows="10" cols="85"></textarea>

                </fieldset>

                <section>
                <button type="submit">Enviar</button>
                <button type="reset">Limpiar</button>
                </section>
            </form>
        </section>
        <section>
            <h2>Ubicación</h2>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d52575.723331211!2d-58.7363051!3d-34.553993199999994!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95bcbd7f8ed7ed6f%3A0xa141f13ddb761d51!2sB1663%20San%20Miguel%2C%20Provincia%20de%20Buenos%20Aires!5e0!3m2!1ses-419!2sar!4v1777759423383!5m2!1ses-419!2sar" width="500" height="238" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>
    </footer>
</body>
</html>
