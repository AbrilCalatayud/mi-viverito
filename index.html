<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pequeño Viverito</title>
    <link href="CSS/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&display=swap" rel="stylesheet">
    <link href="IMG/icono/planta.png" rel="icon">
</head>
<body>
    <header>
        <div class="logo">
            <img src="IMG/icono/planta.png" alt="Logo Planta" height="50px">
            <h1 class="textoLogo">Mi Pequeño Viverito</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#productos">Productos</a></li>
                <li><a href="#resenias">Reseñas</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="productos">
            <h2>Productos</h2>
            <img src="IMG/icono/planta.png" height="500px">
        </section>

        <section id="resenias">
            <h2>Reseñas</h2>
            <img src="IMG/icono/planta.png" height="500px">
        </section>
    </main>

    <footer>
        <section id="contacto">
            <h2>Contacto</h2>
            <img src="IMG/icono/planta.png" height="500px">
        </section>
    </footer>
</body>
</html>
