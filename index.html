<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroMundo</title>
    <link href="CSS/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <link href="IMG/iconos/ElectroMundo.png" rel="icon">
</head>
<body>
    <header>
        <div class="contenedor-icono">
            <img class="imagen-icono" src="IMG/iconos/ElectroMundo.png" alt="Logo ElectroMundo">
            <p class="f1">ElectroMundo</p>
        </div>
        <nav>
            <ul>
                <li><a href="">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="#resenias">Reseñas</a></li>
                <li><a href="#contacto">Contacto</a></li>
                <li><a href="carrito.html">Carrito</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="inicio">
                <p class="f2">¡Mirá nuestros productos!</p>
                <a href="productos.html" class="link-estilo-boton">Ver Productos</a>
        </section>

        <section id="resenias">
            <p class="f2">Reseñas</p>
            <div id="contenedor-resenias"></div>
        </section>

        <section id="contacto">
            <p class="f2">Contacto</p>
            <form action="https://formspree.io/f/mpqbjlpe" method="POST">
                <fieldset>

                    <legend>Información Personal</legend>

                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre">
                    <br>
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email">
                
                </fieldset>

                <fieldset>

                    <legend>Escriba su consulta</legend>
                    <textarea id="consulta" name="consulta"></textarea>

                </fieldset>
                <div class="contenedor-botones-formulario">
                    <button type="submit">Enviar</button>
                    <button type="reset">Limpiar</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <section>
            <p class="f2">¡Seguinos en Instagram!</p>
                <a href="https://www.instagram.com/electro_mundo_oficial">@electro_mundo_oficial</a>
        </section>
        <section>
            <p class="f2">Ubicación</p>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d52575.723331211!2d-58.7363051!3d-34.553993199999994!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95bcbd7f8ed7ed6f%3A0xa141f13ddb761d51!2sB1663%20San%20Miguel%2C%20Provincia%20de%20Buenos%20Aires!5e0!3m2!1ses-419!2sar!4v1777759423383!5m2!1ses-419!2sar" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>
    </footer>
    <script src="JS/script-resenias.js"></script>
</body>
</html>
